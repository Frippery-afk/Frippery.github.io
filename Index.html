<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoW Midnight — Stat Priorities</title>
<style>
    :root {
        --bg: #090b10;
        --card-bg: #11141d;
        --inner-bg: #1a1e29;
        --accent: #c8a94a;
        --text-main: #e2e4e9;
        --text-dim: #9499a6;
        --border: rgba(255, 255, 255, 0.08);
        --glass: rgba(255, 255, 255, 0.03);
        --crit: #ff5f5f; --haste: #ffb347; --mastery: #4ade80; --vers: #60a5fa;
        --str: #f87171; --agi: #a3e635; --int: #818cf8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
        background-color: var(--bg); 
        color: var(--text-main); 
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        line-height: 1.6;
        padding-bottom: 80px;
    }

    .site-header {
        padding: 40px 20px;
        text-align: center;
        background: radial-gradient(circle at top, rgba(200, 169, 74, 0.05) 0%, transparent 70%);
    }

    .site-header h1 {
        font-size: 2rem;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
        color: var(--accent);
    }

    .controls-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        margin-bottom: 40px;
    }

    .filter-group {
        display: flex;
        background: var(--glass);
        padding: 4px;
        border-radius: 12px;
        border: 1px solid var(--border);
        gap: 4px;
    }

    .fbtn {
        background: transparent;
        border: none;
        color: var(--text-dim);
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    .fbtn:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
    .fbtn.active { background: var(--accent); color: #000; }

    .legend {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 15px;
        font-size: 12px;
        color: var(--text-dim);
    }

    .li { display: flex; align-items: center; gap: 6px; }
    .ld { width: 8px; height: 8px; border-radius: 50%; }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .cg { display: flex; flex-direction: column; gap: 16px; }

    .cb {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        transition: border-color 0.3s;
    }

    .ch {
        display: flex;
        align-items: center;
        padding: 16px 20px;
        cursor: pointer;
        background: linear-gradient(90deg, var(--glass), transparent);
    }

    .ci {
        width: 40px; height: 40px; border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 14px; margin-right: 15px;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .cn { font-size: 18px; font-weight: 700; flex-grow: 1; }

    .sg {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 12px;
        padding: 20px;
        background: rgba(0,0,0,0.2);
    }

    .collapsed .sg { display: none; }

    .sc {
        background: var(--inner-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .sh { display: flex; justify-content: space-between; align-items: center; }
    .sn { font-weight: 700; font-size: 15px; }

    .ht {
        background: rgba(0,0,0,0.2);
        border-radius: 8px;
        padding: 10px;
        margin-top: 5px;
    }
    .htn { font-size: 11px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; opacity: 0.8; }
    
    .sr { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .sl2 { font-size: 11px; width: 85px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
    .sb { flex-grow: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
    .sf { height: 100%; border-radius: 3px; }

    .rt { font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: 700; text-transform: uppercase; }
    .tdps { color: var(--crit); background: rgba(255,95,95,0.1); }
    .ttank { color: var(--vers); background: rgba(96,165,250,0.1); }
    .theal { color: var(--mastery); background: rgba(74,222,128,0.1); }
    .tsupp { color: var(--int); background: rgba(129,140,248,0.1); }

    .pb { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; display: inline-block; width: fit-content; margin-bottom: 4px;}
    .pstr { color: var(--str); border: 1px solid rgba(248,113,113,0.3); }
    .pagi { color: var(--agi); border: 1px solid rgba(163,230,53,0.3); }
    .pint { color: var(--int); border: 1px solid rgba(129,140,248,0.3); }

    .wl { font-size: 11px; color: var(--text-dim); text-decoration: none; margin-top: auto; padding-top: 10px; display: block; text-align: right; }
    .wl:hover { color: var(--accent); }

    .footer { text-align: center; margin-top: 60px; color: var(--text-dim); font-size: 12px; }
    
    @media (max-width: 600px) {
        .sg { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>

<header class="site-header">
    <div style="font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 10px;">World of Warcraft</div>
    <h1>Midnight <span>Stats</span></h1>
    <div class="controls-container">
        <div class="filter-group" id="filters">
            <button class="fbtn active" data-f="all">All Roles</button>
            <button class="fbtn" data-f="dps">DPS</button>
            <button class="fbtn" data-f="tank">Tank</button>
            <button class="fbtn" data-f="heal">Healer</button>
        </div>
        
        <div class="legend">
            <div class="li"><div class="ld" style="background:var(--crit)"></div>Crit</div>
            <div class="li"><div class="ld" style="background:var(--haste)"></div>Haste</div>
            <div class="li"><div class="ld" style="background:var(--mastery)"></div>Mastery</div>
            <div class="li"><div class="ld" style="background:var(--vers)"></div>Vers</div>
        </div>
    </div>
</header>

<div class="container">
    <div class="rbar" id="rbar" style="text-align: center; font-size: 13px; color: var(--text-dim); margin-bottom: 20px;"></div>
    <div class="cg" id="classes"></div>
    <div id="es" style="text-align:center; padding: 40px; color: var(--text-dim); display:none;">No specs match this filter.</div>
</div>

<footer class="footer">
    World of Warcraft: Midnight · Dashboard v1.1.0<br>
    Data from Wowhead, Method, and Icy Veins
</footer>

function buildStatRows(stats, equal) {
    const sec = stats.slice(1);
    const eq = equal || [];
    const done = new Set();
    let html = "";
    sec.forEach((s, i) => {
        if (done.has(s)) return;
        let grp = eq.find(g => g.includes(s));
        const pct = 100 - (i * 18);
        if (grp) {
            const label = grp.map(x => C[x]?.s || x).join("=");
            html += `<div class="sr"><span class="sl2">${label}</span><div class="sb"><div class="sf" style="width:${pct}%; background:${C[grp[0]]?.c || '#888'}"></div></div></div>`;
            grp.forEach(x => done.add(x));
        } else {
            html += `<div class="sr"><span class="sl2">${C[s]?.s || s}</span><div class="sb"><div class="sf" style="width:${pct}%; background:${C[s]?.c || '#888'}"></div></div></div>`;
            done.add(s);
        }
    });
    return html;
}

function render() {
    const container = document.getElementById("classes");
    container.innerHTML = CLASSES.map(cl => `
        <div class="cb">
            <div class="ch" onclick="this.parentElement.classList.toggle('collapsed')">
                <div class="ci" style="background:${cl.bg}; color:${cl.color}">${cl.icon}</div>
                <span class="cn">${cl.name}</span>
                <span style="font-size: 12px; color: var(--text-dim);">▾</span>
            </div>
            <div class="sg">
                ${cl.specs.map(sp => {
                    const rC = sp.roles.includes('dps') ? 'tdps' : sp.roles.includes('tank') ? 'ttank' : 'theal';
                    const pC = sp.pri === 'Strength' ? 'pstr' : sp.pri === 'Agility' ? 'pagi' : 'pint';
                    return `
                    <div class="sc" data-role="${sp.roles[0]}">
                        <div class="sh"><span class="sn">${sp.name}</span><span class="rt ${rC}">${sp.role}</span></div>
                        <div class="pb ${pC}">${sp.pri}</div>
                        <div class="hts">${sp.trees.map(t => `<div class="ht"><div class="htn">${t.name}</div>${buildStatRows(t.stats, t.equal)}</div>`).join('')}</div>
                        <a href="https://wowhead.com/guide/classes/${sp.wh}/stat-priority" target="_blank" class="wl">Guide ↗</a>
                    </div>`;
                }).join('')}
            </div>
        </div>
    `).join('');
    updateCount();
}

function updateCount() {
    const vis = document.querySelectorAll('.sc:not([style*="display: none"])').length;
    document.getElementById('rbar').innerText = `Showing ${vis} of 40 Specializations`;
}

document.getElementById("filters").addEventListener("click", (e) => {
    const btn = e.target.closest(".fbtn");
    if (!btn) return;
    document.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const filter = btn.dataset.f;
    document.querySelectorAll(".cb").forEach(card => {
        let hasVisibleSpec = false;
        card.querySelectorAll(".sc").forEach(spec => {
            const isMatch = filter === 'all' || spec.dataset.role === filter;
            spec.style.display = isMatch ? "flex" : "none";
            if (isMatch) hasVisibleSpec = true;
        });
        card.style.display = hasVisibleSpec ? "block" : "none";
    });
    updateCount();
});

render();

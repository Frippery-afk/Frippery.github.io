<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoW Midnight — Stat Priorities</title>
<style>
    :root {
        --bg: #090b10;
        --card-bg: #11141d;
        --inner-bg: #1a1e29;
        --accent: #c8a94a;
        --text-main: #e2e4e9;
        --text-dim: #9499a6;
        --border: rgba(255, 255, 255, 0.08);
        --glass: rgba(255, 255, 255, 0.03);
        --crit: #e05252; --haste: #e09c38; --mastery: #38b87a; --vers: #3d8fd6;
        --str: #d86040; --agi: #68b830; --int: #8880e0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
        background-color: var(--bg); 
        color: var(--text-main); 
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        line-height: 1.6;
        padding-bottom: 80px;
    }

    /* Centered Header & Filters */
    .site-header {
        padding: 40px 20px;
        text-align: center;
        background: radial-gradient(circle at top, rgba(200, 169, 74, 0.05) 0%, transparent 70%);
    }

    .site-header h1 {
        font-size: 2rem;
        letter-spacing: -0.02em;
        margin-bottom: 20px;
        color: var(--accent);
    }

    .controls-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        margin-bottom: 40px;
    }

    .filter-group {
        display: flex;
        background: var(--glass);
        padding: 4px;
        border-radius: 12px;
        border: 1px solid var(--border);
        gap: 4px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .fbtn {
        background: transparent;
        border: none;
        color: var(--text-dim);
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    .fbtn:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
    .fbtn.active { background: var(--accent); color: #000; }

    .legend {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 15px;
        font-size: 11px;
        color: var(--text-dim);
    }

    .li { display: flex; align-items: center; gap: 6px; }
    .ld { width: 8px; height: 8px; border-radius: 50%; }

    /* Compact Grid Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .cg { display: flex; flex-direction: column; gap: 16px; }

    .cb {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
    }

    .ch {
        display: flex;
        align-items: center;
        padding: 12px 20px;
        cursor: pointer;
        background: linear-gradient(90deg, var(--glass), transparent);
    }

    .ci {
        width: 36px; height: 36px; border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 12px; margin-right: 15px;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .cn { font-size: 16px; font-weight: 700; flex-grow: 1; }

    /* Spec Grid - Fixed "Open Shaded Area" issue */
    .sg {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 12px;
        padding: 15px;
        background: rgba(0,0,0,0.15);
    }

    .collapsed .sg { display: none; }

    .sc {
        background: var(--inner-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
    }

    .sh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .sn { font-weight: 700; font-size: 14px; }

    /* Dual Hero Tree Support */
    .hts { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px; }
    
    .ht {
        background: rgba(0,0,0,0.2);
        border-radius: 8px;
        padding: 10px;
    }
    .htn { font-size: 10px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 4px;}
    
    .sr { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .sl2 { font-size: 10px; width: 70px; color: var(--text-dim); }
    .sb { flex-grow: 1; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
    .sf { height: 100%; border-radius: 2px; }

    /* Badges */
    .rt { font-size: 9px; padding: 2px 8px; border-radius: 6px; font-weight: 700; text-transform: uppercase; }
    .tdps { color: var(--crit); background: rgba(224,82,82,0.1); }
    .ttank { color: var(--vers); background: rgba(61,143,214,0.1); }
    .theal { color: var(--mastery); background: rgba(56,184,122,0.1); }
    .tsupp { color: var(--int); background: rgba(136,128,224,0.1); }

    .pb { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 10px; text-transform: uppercase;}
    .pstr { color: var(--str); border: 1px solid rgba(216,96,64,0.3); }
    .pagi { color: var(--agi); border: 1px solid rgba(104,184,48,0.3); }
    .pint { color: var(--int); border: 1px solid rgba(136,128,224,0.3); }

    .wl { font-size: 10px; color: var(--text-dim); text-decoration: none; margin-top: 15px; display: block; text-align: right; }
    .wl:hover { color: var(--accent); }

    @media (max-width: 600px) {
        .sg { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>

<header class="site-header">
    <h1>Midnight <span>Stat Priorities</span></h1>
    <div class="controls-container">
        <div class="filter-group" id="filters">
            <button class="fbtn active" data-f="all">All Roles</button>
            <button class="fbtn" data-f="dps">DPS</button>

        </div>
        
        <div class="legend">
            <div class="li"><div class="ld" style="background:var(--crit)"></div>Crit</div>
            <div class="li"><div class="ld" style="background:var(--haste)"></div>Haste</div>
            <div class="li"><div class="ld" style="background:var(--mastery)"></div>Mastery</div>
            <div class="li"><div class="ld" style="background:var(--vers)"></div>Vers</div>
        </div>
    </div>
</header>

function buildStatRows(stats, equal) {
    const sec = stats.slice(1);
    const eq = equal || [];
    const done = new Set();
    let html = "";
    sec.forEach((s, i) => {
        if (done.has(s)) return;
        let grp = eq.find(g => g.includes(s));
        const pct = 100 - (i * 22);
        if (grp) {
            html += `<div class="sr"><span class="sl2">${grp.map(x => C[x]?.s || x).join("/")}</span><div class="sb"><div class="sf" style="width:${pct}%; background:${C[grp[0]].c}"></div></div></div>`;
            grp.forEach(x => done.add(x));
        } else {
            html += `<div class="sr"><span class="sl2">${C[s]?.s || s}</span><div class="sb"><div class="sf" style="width:${pct}%; background:${C[s]?.c || '#888'}"></div></div></div>`;
            done.add(s);
        }
    });
    return html;
}

function render() {
    const container = document.getElementById("classes");
    container.innerHTML = CLASSES.map(cl => `
        <div class="cb">
            <div class="ch" onclick="this.parentElement.classList.toggle('collapsed')">
                <div class="ci" style="background:${cl.bg}; color:${cl.color}">${cl.icon}</div>
                <span class="cn">${cl.name}</span>
                <span style="font-size: 11px; color: var(--text-dim); margin-left: 10px;">${cl.specs.length} Specs ▾</span>
            </div>
            <div class="sg">
                ${cl.specs.map(sp => `
                    <div class="sc" data-role="${sp.roles[0]}">
                        <div class="sh"><span class="sn">${sp.name}</span><span class="rt ${sp.roles[0] === 'dps' ? 'tdps' : sp.roles[0] === 'tank' ? 'ttank' : sp.roles[0] === 'support' ? 'tsupp' : 'theal'}">${sp.role}</span></div>
                        <div class="pb ${sp.pri === 'Strength' ? 'pstr' : sp.pri === 'Agility' ? 'pagi' : 'pint'}">${sp.pri}</div>
                        <div class="hts">${sp.trees.map(t => `<div class="ht"><div class="htn">${t.name}</div>${buildStatRows(t.stats, t.equal)}</div>`).join('')}</div>
                    </div>`).join('')}
            </div>
        </div>
    `).join('');
    updateCount();
}

function updateCount() {
    const vis = document.querySelectorAll('.sc:not([style*="display: none"])').length;
    document.getElementById('rbar').innerText = `Displaying ${vis} Specializations`;
}

document.getElementById("filters").addEventListener("click", (e) => {
    const btn = e.target.closest(".fbtn");
    if (!btn) return;
    document.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const filter = btn.dataset.f;
    document.querySelectorAll(".cb").forEach(card => {
        let hasVisibleSpec = false;
        card.querySelectorAll(".sc").forEach(spec => {
            const isMatch = filter === 'all' || spec.dataset.role === filter;
            spec.style.display = isMatch ? "flex" : "none";
            if (isMatch) hasVisibleSpec = true;
        });
        card.style.display = hasVisibleSpec ? "block" : "none";
    });
    updateCount();
});

render();
